<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f5ead8; --ink: #2c1a0e; --gold: #c9861f; --gold-light: #e8b84b;
  --bronze: #8b5e3c; --deep-red: #7a1f1f; --green: #2e6b3e;
  --shadow: rgba(44,26,14,0.22); --stone: #b5a48a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--ink);
  background-image: radial-gradient(ellipse at 20% 10%,#3a2010 0%,transparent 55%),
                    radial-gradient(ellipse at 80% 90%,#1a0e05 0%,transparent 55%);
  min-height: 100vh; font-family: 'Crimson Text', serif; color: var(--ink); overflow-x: hidden;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star  { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 3s infinite alternate; }
@keyframes twinkle { from{opacity:.15} to{opacity:.85} }
.page-wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 20px 14px 56px; }

/* HEADER */
header { text-align: center; padding: 22px 0 14px; border-bottom: 2px solid var(--gold); margin-bottom: 16px; }
.title-main { font-family:'Cinzel Decorative',serif; font-size:clamp(1.4rem,5vw,2.2rem); color:var(--gold-light); letter-spacing:2px; text-shadow:0 2px 12px rgba(201,134,31,.5); }
.title-sub  { font-size:.95rem; color:var(--stone); margin-top:5px; font-style:italic; }

/* VIEW TABS */
.view-tabs { display:flex; margin-bottom:16px; border:1.5px solid rgba(201,134,31,.35); border-radius:10px; overflow:hidden; }
.view-tab  { flex:1; padding:11px 10px; background:rgba(245,234,216,.04); border:none; border-right:1.5px solid rgba(201,134,31,.25); color:var(--stone); font-family:'Cinzel Decorative',serif; font-size:.66rem; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.view-tab:last-child { border-right:none; }
.view-tab.active { background:rgba(201,134,31,.18); color:var(--gold-light); }
.view-tab:hover:not(.active) { background:rgba(201,134,31,.08); color:var(--parchment); }

/* HUD */
.hud { display:flex; justify-content:space-between; align-items:center; background:rgba(245,234,216,.06); border:1px solid rgba(201,134,31,.28); border-radius:10px; padding:9px 16px; margin-bottom:14px; gap:8px; flex-wrap:wrap; }
.hud-item { color:var(--stone); font-size:.9rem; }
.hud-item span { font-family:'Exo 2',sans-serif; font-weight:700; color:var(--gold-light); font-size:1.1rem; }
.stars-row { font-size:1.4rem; letter-spacing:2px; }

/* MODE BAR */
.mode-bar { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.mode-btn  { flex:1; min-width:58px; padding:8px 5px; background:rgba(245,234,216,.05); border:1.5px solid rgba(201,134,31,.3); border-radius:8px; color:var(--stone); font-family:'Crimson Text',serif; font-size:.86rem; cursor:pointer; transition:all .18s; text-align:center; }
.mode-btn:hover,.mode-btn.active { background:rgba(201,134,31,.16); border-color:var(--gold); color:var(--gold-light); }
.mode-icon { font-size:1.1rem; display:block; margin-bottom:1px; }

/* PROGRESS */
.progress-track { display:flex; gap:5px; margin-bottom:14px; flex-wrap:wrap; }
.prog-dot { width:11px; height:11px; border-radius:50%; background:rgba(181,164,138,.18); border:1.5px solid rgba(181,164,138,.28); transition:background .3s; }
.prog-dot.current     { background:rgba(201,134,31,.5); border-color:var(--gold); }
.prog-dot.correct-dot { background:var(--green); border-color:#5abd7a; }
.prog-dot.wrong-dot   { background:var(--deep-red); border-color:#e05050; }

/* QUESTION */
.question-label { font-family:'Crimson Text',serif; font-size:1.05rem; font-style:italic; color:var(--stone); margin-bottom:12px; text-align:center; line-height:1.45; }
.instruction    { text-align:center; margin-bottom:12px; font-family:'Exo 2',sans-serif; font-size:.7rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(181,164,138,.45); }

/* LAYOUT */
.game-layout { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; align-items:start; }
@media(max-width:420px){ .game-layout { grid-template-columns:1fr; } }
.panel-label { font-family:'Exo 2',sans-serif; font-size:.66rem; letter-spacing:2px; text-transform:uppercase; color:rgba(181,164,138,.45); margin-bottom:7px; }
.card-pool   { display:flex; flex-direction:column; gap:7px; background:rgba(0,0,0,.22); border:1.5px dashed rgba(201,134,31,.22); border-radius:10px; padding:10px; min-height:56px; }
.slots-panel { display:flex; flex-direction:column; gap:7px; background:rgba(0,0,0,.18); border:1.5px solid rgba(201,134,31,.18); border-radius:10px; padding:10px; min-height:56px; position:relative; }
.slots-panel::before { content:'1 = earliest'; position:absolute; top:-9px; left:12px; background:#2c1a0e; color:rgba(181,164,138,.4); font-family:'Exo 2',sans-serif; font-size:.58rem; letter-spacing:1px; text-transform:uppercase; padding:0 5px; }

/* SLOTS */
.slot { display:flex; align-items:center; gap:8px; min-height:50px; border:2px dashed rgba(201,134,31,.25); border-radius:8px; padding:4px 8px; cursor:pointer; transition:border-color .18s,background .18s; }
.slot:hover:not(.locked) { border-color:rgba(201,134,31,.55); background:rgba(201,134,31,.04); }
.slot.slot-ready  { border-color:rgba(201,134,31,.45); }
.slot.slot-target { border-color:var(--gold-light); background:rgba(232,184,75,.08); animation:pulse-slot .9s infinite alternate; }
@keyframes pulse-slot { from{border-color:rgba(232,184,75,.4)} to{border-color:var(--gold-light)} }
.slot.locked { cursor:default; }
.slot-num        { font-family:'Exo 2',sans-serif; font-weight:700; font-size:.82rem; color:rgba(181,164,138,.38); min-width:16px; flex-shrink:0; }
.slot-empty-hint { font-family:'Crimson Text',serif; font-style:italic; color:rgba(181,164,138,.25); font-size:.8rem; flex:1; }

/* CARDS */
.hcard { background:linear-gradient(135deg,#f5ead8 85%,#e8d5b0 100%); border:2px solid var(--bronze); border-radius:8px; padding:8px 11px; cursor:pointer; user-select:none; font-family:'Crimson Text',serif; color:var(--ink); display:flex; align-items:center; gap:9px; box-shadow:0 2px 7px var(--shadow),inset 0 1px 0 rgba(255,255,255,.5); transition:transform .14s,box-shadow .14s,border-color .14s; touch-action:manipulation; width:100%; }
.hcard:active   { transform:scale(.97); }
.hcard.selected { border-color:var(--gold-light); box-shadow:0 0 0 3px rgba(232,184,75,.3),0 4px 12px var(--shadow); transform:translateY(-2px); background:linear-gradient(135deg,#fff8ec 85%,#f5e6be 100%); }
.hcard.correct  { border-color:#3a9b55; background:linear-gradient(135deg,#d4edda 85%,#b4dfc4 100%); cursor:default; }
.hcard.wrong    { border-color:#b03030; background:linear-gradient(135deg,#f8d7da 85%,#f0b5ba 100%); cursor:default; animation:shake .38s; }
.hcard.locked   { cursor:default; }
.card-emoji { font-size:1.35rem; flex-shrink:0; line-height:1; }
.card-text  { display:flex; flex-direction:column; flex:1; min-width:0; }
.card-name  { font-weight:600; font-size:.88rem; line-height:1.25; }
.card-era   { font-size:.7rem; color:var(--bronze); font-style:italic; margin-top:1px; visibility:hidden; }
.card-wiki  { display:none; font-size:.6rem; color:rgba(106,158,207,.75); text-decoration:none; margin-top:3px; font-family:'Exo 2',sans-serif; border-bottom:1px dotted rgba(106,158,207,.35); align-self:flex-start; pointer-events:none; }
.card-wiki.revealed { display:inline; pointer-events:auto; }
.card-wiki:hover    { color:#9bc4e8; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

/* CONTROLS */
.controls { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.btn { font-family:'Cinzel Decorative',serif; font-size:.7rem; letter-spacing:.8px; padding:11px 14px; border:none; border-radius:8px; cursor:pointer; transition:all .18s; flex:1; min-width:80px; }
.btn-gold  { background:linear-gradient(135deg,var(--gold),var(--gold-light)); color:var(--ink); box-shadow:0 2px 10px rgba(201,134,31,.32); }
.btn-gold:hover  { transform:translateY(-2px); box-shadow:0 4px 14px rgba(201,134,31,.48); }
.btn-ghost { background:transparent; color:var(--stone); border:1.5px solid rgba(181,164,138,.28); }
.btn-ghost:hover { border-color:var(--stone); color:var(--parchment); }

/* RESULT / HINT / ANSWER */
.result-banner { display:none; padding:15px 16px; border-radius:10px; margin-bottom:12px; text-align:center; animation:fadeIn .32s; }
.result-banner.show    { display:block; }
.result-banner.success { background:rgba(46,107,62,.18); border:2px solid var(--green); color:#9cdeb0; }
.result-banner.fail    { background:rgba(122,31,31,.18); border:2px solid var(--deep-red); color:#f0b5ba; }
.result-banner h2 { font-family:'Cinzel Decorative',serif; font-size:1.05rem; margin-bottom:4px; }
.result-banner p  { font-size:.9rem; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.hint-box { background:rgba(58,111,168,.1); border:1px solid rgba(58,111,168,.26); border-radius:8px; padding:10px 14px; margin-bottom:12px; color:#8ab4d8; font-size:.88rem; display:none; line-height:1.55; }
.hint-box.show { display:block; }
.answer-reveal { display:none; flex-direction:column; gap:5px; padding:12px; background:rgba(0,0,0,.2); border-radius:8px; margin-bottom:12px; }
.answer-reveal.show { display:flex; }
.answer-reveal-title { font-family:'Exo 2',sans-serif; font-size:.68rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--stone); margin-bottom:3px; }
.answer-chip { background:rgba(201,134,31,.1); border:1px solid rgba(201,134,31,.32); border-radius:6px; padding:5px 10px; color:var(--gold-light); font-size:.8rem; font-family:'Exo 2',sans-serif; display:flex; gap:6px; align-items:center; }
.chip-num { opacity:.45; }
.next-wrap { text-align:center; margin-top:4px; }

/* ═══════════════════════════════
   LEARN SECTION
═══════════════════════════════ */
#learnSection { display:none; }

.learn-intro { text-align:center; padding:2px 0 14px; font-family:'Crimson Text',serif; font-style:italic; color:var(--stone); font-size:.93rem; line-height:1.6; }
.learn-intro strong { color:var(--gold-light); font-style:normal; font-family:'Cinzel Decorative',serif; font-size:.82rem; display:block; margin-bottom:4px; }

/* Learn sub-tabs */
.learn-tabs { display:flex; gap:7px; margin-bottom:14px; }
.learn-tab  { flex:1; padding:9px 6px; background:rgba(245,234,216,.04); border:1.5px solid rgba(201,134,31,.28); border-radius:8px; color:var(--stone); font-family:'Crimson Text',serif; font-size:.88rem; cursor:pointer; transition:all .18s; text-align:center; }
.learn-tab:hover,.learn-tab.active { background:rgba(201,134,31,.16); border-color:var(--gold); color:var(--gold-light); }
.learn-tab-icon { font-size:1.1rem; display:block; margin-bottom:1px; }

/* Full-bleed breakout */
.tl-fullbleed { width:100vw; position:relative; left:50%; transform:translateX(-50%); margin-bottom:0; }

/* Zoom controls */
.zoom-bar   { display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:0 14px 8px; }
.zoom-label { font-family:'Exo 2',sans-serif; font-size:.6rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(181,164,138,.4); margin-right:2px; }
.zoom-btn   { width:28px; height:28px; background:rgba(201,134,31,.1); border:1px solid rgba(201,134,31,.3); border-radius:6px; color:var(--gold-light); font-size:1rem; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.zoom-btn:hover { background:rgba(201,134,31,.22); }
.zoom-level { font-family:'Exo 2',sans-serif; font-size:.68rem; color:var(--stone); min-width:38px; text-align:center; }

/* Scroll container */
.tl-scroll-outer {
  overflow-y:auto; overflow-x:hidden; height:min(540px,70vh);
  background:linear-gradient(180deg,#100804 0%,#0a0502 50%,#100804 100%);
  border-top:1px solid rgba(201,134,31,.18); border-bottom:1px solid rgba(201,134,31,.18);
  cursor:grab; scrollbar-width:thin; scrollbar-color:rgba(201,134,31,.28) rgba(0,0,0,.2);
}
.tl-scroll-outer::-webkit-scrollbar { width:4px; }
.tl-scroll-outer::-webkit-scrollbar-track { background:rgba(0,0,0,.3); }
.tl-scroll-outer::-webkit-scrollbar-thumb { background:rgba(201,134,31,.3); border-radius:2px; }
.tl-scroll-outer.grabbing { cursor:grabbing; }
.tl-scroll-inner { width:100%; position:relative; transition:height .3s ease; }

/* Era bands */
.era-band         { position:absolute; left:0; right:0; opacity:.17; }
.era-band.ancient { background:linear-gradient(180deg,#a07028,#3a2005); }
.era-band.medieval{ background:linear-gradient(180deg,#285020,#0d1e0a); }
.era-band.earlymod{ background:linear-gradient(180deg,#204878,#080f20); }
.era-band.industrial{background:linear-gradient(180deg,#502060,#1a0820); }
.era-band.contemp { background:linear-gradient(180deg,#1a3a80,#060f28); }
/* Britain eras */
.era-band.roman   { background:linear-gradient(180deg,#8b2020,#350606); }
.era-band.br-med  { background:linear-gradient(180deg,#285020,#0d1e0a); }
.era-band.tudor   { background:linear-gradient(180deg,#602080,#1e0830); }
.era-band.georgian{ background:linear-gradient(180deg,#183860,#060e20); }
.era-band.br-mod  { background:linear-gradient(180deg,#801818,#280505); }
/* Poland eras */
.era-band.piast   { background:linear-gradient(180deg,#b8860b,#5a3e0a); }
.era-band.jagiel  { background:linear-gradient(180deg,#7a2080,#2d0a40); }
.era-band.common  { background:linear-gradient(180deg,#8b1a1a,#350606); }
.era-band.part    { background:linear-gradient(180deg,#3a3a50,#14141e); }
.era-band.modern  { background:linear-gradient(180deg,#1a3a80,#060f28); }

/* Era tags at top of band */
.era-tag { position:absolute; left:0; right:0; height:18px; display:flex; align-items:center; justify-content:center; font-family:'Exo 2',sans-serif; font-size:.44rem; letter-spacing:1.6px; text-transform:uppercase; font-weight:600; pointer-events:none; white-space:nowrap; border-bottom:1px solid currentColor; opacity:.3; overflow:hidden; }
.era-tag.ancient  { color:#d4a030; } .era-tag.medieval { color:#60b050; }
.era-tag.earlymod { color:#5090d0; } .era-tag.industrial { color:#c060e0; }
.era-tag.contemp  { color:#5090e0; }
.era-tag.roman    { color:#e05050; } .era-tag.br-med   { color:#60b050; }
.era-tag.tudor    { color:#b060e0; } .era-tag.georgian { color:#4080c0; }
.era-tag.br-mod   { color:#e05050; }
.era-tag.piast    { color:#d4a830; } .era-tag.jagiel   { color:#c060e0; }
.era-tag.common   { color:#e05050; } .era-tag.part     { color:#8888aa; }
.era-tag.modern   { color:#5090e0; }

/* Spine & ticks */
.tl-spine    { position:absolute; top:0; bottom:0; width:2px; left:50%; transform:translateX(-50%); background:linear-gradient(180deg,transparent .2%,rgba(201,134,31,.45) 1.5%,rgba(201,134,31,.45) 98.5%,transparent 99.8%); }
.tl-tick     { position:absolute; height:1px; left:0; right:0; background:rgba(181,164,138,.07); pointer-events:none; }
.tl-tick-maj { background:rgba(181,164,138,.14); }
.tl-tick-lbl { position:absolute; font-family:'Exo 2',sans-serif; font-size:.44rem; color:rgba(181,164,138,.22); transform:translateY(-50%); pointer-events:none; white-space:nowrap; left:calc(50% + 16px); }

/* Event nodes */
.tl-node { position:absolute; left:50%; display:flex; flex-direction:row; align-items:center; cursor:pointer; z-index:3; }
.tl-node.above { transform:translate(-100%,-50%); }
.tl-node.below { transform:translate(0,-50%); }
.tl-dot  { width:10px; height:10px; border-radius:50%; border:2px solid rgba(232,184,75,.55); background:#1a0f06; transition:all .18s; flex-shrink:0; z-index:4; }
.tl-node:hover .tl-dot,.tl-node.active .tl-dot { background:var(--gold-light); border-color:var(--gold-light); transform:scale(1.4); box-shadow:0 0 10px rgba(232,184,75,.7); }
.tl-stem { height:1px; background:rgba(201,134,31,.3); flex-shrink:0; width:24px; }
.tl-node:hover .tl-stem,.tl-node.active .tl-stem { background:rgba(232,184,75,.5); }
.tl-card { display:flex; flex-direction:column; max-width:88px; padding:3px 5px; border-radius:5px; background:rgba(0,0,0,0); transition:background .18s; }
.tl-node.above .tl-card { text-align:right; align-items:flex-end; }
.tl-node.below .tl-card { text-align:left; align-items:flex-start; }
.tl-node:hover .tl-card,.tl-node.active .tl-card { background:rgba(0,0,0,.4); }
.tl-emoji { font-size:1rem; line-height:1; margin-bottom:1px; }
.tl-year  { font-family:'Exo 2',sans-serif; font-size:.48rem; font-weight:700; color:rgba(232,184,75,.65); letter-spacing:.5px; white-space:nowrap; }
.tl-name  { font-family:'Crimson Text',serif; font-size:.58rem; color:rgba(181,164,138,.7); line-height:1.2; margin-top:1px; }
.tl-node:hover .tl-name,.tl-node.active .tl-name { color:var(--parchment); }

/* Detail panel */
.detail-panel { display:none; margin:12px 0 16px; background:rgba(12,7,3,.92); border:1.5px solid rgba(201,134,31,.28); border-radius:12px; overflow:hidden; animation:fadeIn .25s; }
.detail-panel.show { display:block; }
.detail-era-stripe { height:3px; width:100%; }
.detail-body   { padding:14px 16px 16px; position:relative; }
.detail-close  { position:absolute; top:12px; right:14px; background:none; border:none; color:rgba(181,164,138,.3); font-size:1.1rem; cursor:pointer; line-height:1; padding:2px 4px; transition:color .15s; border-radius:4px; }
.detail-close:hover { color:var(--stone); background:rgba(255,255,255,.05); }
.detail-top    { display:flex; align-items:flex-start; gap:14px; margin-bottom:11px; }
.detail-big-emoji { font-size:2.4rem; line-height:1; flex-shrink:0; margin-top:2px; }
.detail-meta   { flex:1; min-width:0; padding-right:24px; }
.detail-title  { font-family:'Cinzel Decorative',serif; font-size:.9rem; color:var(--gold-light); line-height:1.3; margin-bottom:5px; }
.detail-pills  { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.detail-year-pill { font-family:'Exo 2',sans-serif; font-size:.65rem; font-weight:700; letter-spacing:1px; color:rgba(232,184,75,.65); }
.detail-era-pill  { font-family:'Exo 2',sans-serif; font-size:.58rem; letter-spacing:1.2px; text-transform:uppercase; padding:2px 8px; border-radius:20px; border:1px solid; }
.detail-desc   { font-family:'Crimson Text',serif; font-size:.93rem; line-height:1.65; color:rgba(245,234,216,.82); margin-bottom:12px; }
.detail-wiki   { display:inline-flex; align-items:center; gap:5px; font-family:'Exo 2',sans-serif; font-size:.62rem; letter-spacing:.4px; color:rgba(106,158,207,.65); text-decoration:none; border-bottom:1px dotted rgba(106,158,207,.28); transition:color .15s,border-color .15s; }
.detail-wiki:hover { color:#9bc4e8; border-bottom-color:rgba(106,158,207,.55); }
</style>
</head>
<body>
<div class="stars" id="starfield"></div>
<div class="page-wrap">

  <header>
    <div class="title-main">⚔️ Timeline Quest</div>
    <div class="title-sub">Put history in order — earliest to latest</div>
  </header>

  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('play',this)">⚔️ Play</button>
    <button class="view-tab" onclick="switchView('learn',this)">📖 Learn</button>
  </div>

  <!-- PLAY SECTION -->
  <div id="playSection">
    <div class="hud">
      <div class="hud-item">Score <span id="scoreDisplay">0</span></div>
      <div class="hud-item stars-row" id="starsDisplay">☆☆☆</div>
      <div class="hud-item">Round <span id="roundDisplay">1</span> / 10</div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn active" onclick="setMode('world',this)"><span class="mode-icon">🌍</span>World</button>
      <button class="mode-btn" onclick="setMode('britain',this)"><span class="mode-icon">🏰</span>Britain</button>
      <button class="mode-btn" onclick="setMode('poland',this)"><span class="mode-icon">🦅</span>Poland</button>
      <button class="mode-btn" onclick="setMode('mixed',this)"><span class="mode-icon">🗺️</span>Mixed</button>
    </div>
    <div class="progress-track" id="progressTrack"></div>
    <div class="question-label" id="questionLabel"></div>
    <div class="instruction">Tap a card · then tap a slot to place it</div>
    <div class="game-layout">
      <div><div class="panel-label">Cards to place</div><div class="card-pool" id="cardPool"></div></div>
      <div><div class="panel-label">Your timeline</div><div class="slots-panel" id="slotsPanel"></div></div>
    </div>
    <div class="hint-box" id="hintBox"></div>
    <div class="controls">
      <button class="btn btn-gold" onclick="checkAnswer()">⚖️ Check</button>
      <button class="btn btn-ghost" onclick="showHint()">💡 Hint</button>

// GAME STATE
// ============================================================
let mode = 'world', rounds = [], currentRound = 0, score = 0;
let roundResults = [], hintUsed = false, answered = false;
let selectedCard = null, slotContents = [];

const ZOOM_HEIGHTS = [1200, 1900, 2800, 4200];
let zoomIdx = 1, currentLearnView = 'world', activeNode = null;

// ============================================================
// VIEW SWITCHER
// ============================================================
function switchView(v, btn) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('playSection').style.display  = v === 'play'  ? '' : 'none';
  document.getElementById('learnSection').style.display = v === 'learn' ? 'block' : 'none';
  if (v === 'learn') renderLearn(currentLearnView);
}

function switchLearnView(v, btn) {
  document.querySelectorAll('.learn-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentLearnView = v;
  closeDetail();
  zoomIdx = 1;
  document.getElementById('zoomLevel').textContent = '100%';
  renderLearn(v);
}

function renderLearn(key) {
  const tl = TL_DATA[key];
  document.getElementById('learnTitle').textContent    = tl.title;
  document.getElementById('learnSubtitle').textContent = tl.subtitle;
  document.getElementById('tlInner').innerHTML = '';
  document.getElementById('tlInner').style.height = ZOOM_HEIGHTS[zoomIdx] + 'px';
  buildTimeline(key);
  enableDragScroll(document.getElementById('tlOuter'));
}

// ============================================================
// TIMELINE BUILDER
// ============================================================
function buildTimeline(key) {
  const tl   = TL_DATA[key];
  const span = tl.end - tl.start;
  const p    = y => ((y - tl.start) / span * 100).toFixed(3) + '%';
  const inner = document.getElementById('tlInner');

  // Era bands
  tl.eraBands.forEach(b => {
    const band = document.createElement('div');
    band.className = 'era-band ' + b.key;
    band.style.top    = p(b.start);
    band.style.height = ((b.end - b.start) / span * 100).toFixed(3) + '%';
    inner.appendChild(band);
    const tag = document.createElement('div');
    tag.className   = 'era-tag ' + b.key;
    tag.textContent = tl.eraMeta[b.key].label.toUpperCase();
    tag.style.top   = p(b.start);
    inner.appendChild(tag);
  });

  // Spine
  const spine = document.createElement('div'); spine.className = 'tl-spine';
  inner.appendChild(spine);

  // Tick marks
  const first = Math.ceil(tl.start / tl.tickMajor) * tl.tickMajor;
  for (let y = first; y < tl.end; y += tl.tickMajor) {
    const tick = document.createElement('div');
    tick.className = 'tl-tick tl-tick-maj';
    tick.style.top = p(y);
    inner.appendChild(tick);
    if (y % tl.tickLabel === 0) {
      const lbl = document.createElement('div');
      lbl.className = 'tl-tick-lbl';
      lbl.style.top = p(y);
      lbl.textContent = y < 0 ? Math.abs(y) + ' BC' : y + ' AD';
      inner.appendChild(lbl);
    }
  }

  // Event nodes
  tl.events.forEach((ev, i) => {
    const above = i % 2 === 0;
    const node  = document.createElement('div');
    node.className  = 'tl-node ' + (above ? 'above' : 'below');
    node.style.top  = p(ev.year);
    node.style.left = '50%';

    const dot  = document.createElement('div'); dot.className  = 'tl-dot';
    const stem = document.createElement('div'); stem.className = 'tl-stem';
    const card = document.createElement('div'); card.className = 'tl-card';

    const yrText = ev.year < 0 ? Math.abs(ev.year) + ' BC' : ev.year + ' AD';
    card.innerHTML = `<span class="tl-emoji">${ev.emoji}</span><span class="tl-year">${yrText}</span><span class="tl-name">${ev.title}</span>`;

    if (above) { node.appendChild(card); node.appendChild(stem); node.appendChild(dot); }
    else       { node.appendChild(dot);  node.appendChild(stem); node.appendChild(card); }

    node.addEventListener('click', () => openDetail(ev, node, tl.eraMeta));
    inner.appendChild(node);
  });
}

function adjustZoom(dir) {
  zoomIdx = Math.max(0, Math.min(ZOOM_HEIGHTS.length - 1, zoomIdx + dir));
  document.getElementById('tlInner').style.height = ZOOM_HEIGHTS[zoomIdx] + 'px';
  document.getElementById('zoomLevel').textContent = Math.round(ZOOM_HEIGHTS[zoomIdx] / ZOOM_HEIGHTS[1] * 100) + '%';
}

function openDetail(ev, node, eraMeta) {
  if (activeNode) activeNode.classList.remove('active');
  activeNode = node; node.classList.add('active');
  const m = eraMeta[ev.era];
  document.getElementById('detailStripe').style.background = m.color;
  document.getElementById('detailEmoji').textContent = ev.emoji;
  document.getElementById('detailTitle').textContent = ev.title;
  const yrText = ev.year < 0 ? Math.abs(ev.year) + ' BC' : ev.year + ' AD';
  document.getElementById('detailYear').textContent = yrText;
  const pill = document.getElementById('detailEraPill');
  pill.textContent = m.label; pill.style.background = m.pill; pill.style.color = m.color; pill.style.borderColor = m.border;
  document.getElementById('detailDesc').textContent = ev.desc;
  document.getElementById('detailWiki').href = ev.wiki;
  const panel = document.getElementById('detailPanel');
  panel.className = 'detail-panel show';
  setTimeout(() => panel.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function closeDetail() {
  document.getElementById('detailPanel').className = 'detail-panel';
  if (activeNode) { activeNode.classList.remove('active'); activeNode = null; }
}

function enableDragScroll(el) {
  el.onmousedown = e => {
    let startY = e.pageY - el.offsetTop, st = el.scrollTop;
    el.classList.add('grabbing');
    const onMove = e => { if (e.buttons) el.scrollTop = st - (e.pageY - el.offsetTop - startY); };
    const onUp   = () => { el.classList.remove('grabbing'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  };
}

// ============================================================
// GAME INIT
// ============================================================
function buildStars() {
  const sf = document.getElementById('starfield');
  for (let i=0;i<60;i++){
    const s = document.createElement('div'); s.className='star';
    const z = Math.random()*2.2+.4;
    s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
    sf.appendChild(s);
  }
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function setMode(m,btn){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');restart();}

function getRounds(){
  let pool;
  if(mode==='world') pool=WORLD; else if(mode==='britain') pool=BRITAIN;
  else if(mode==='poland') pool=POLAND;
  else pool=[...shuffle(WORLD).slice(0,3),...shuffle(BRITAIN).slice(0,3),...shuffle(POLAND).slice(0,2),...MIXED_EXTRA.slice(0,2)];
  return shuffle(pool).slice(0,10);
}

function restart(){score=0;currentRound=0;roundResults=[];rounds=getRounds();updateHUD();loadRound();}

function loadRound(){
  answered=false;hintUsed=false;selectedCard=null;slotContents=[null,null,null,null];
  document.getElementById('questionLabel').textContent=rounds[currentRound].q;
  buildProgressTrack();renderPool(shuffle(rounds[currentRound].items));renderSlots();
  document.getElementById('hintBox').className='hint-box';
  document.getElementById('answerReveal').className='answer-reveal';
  document.getElementById('answerReveal').innerHTML='<div class="answer-reveal-title">Correct order:</div>';
  document.getElementById('resultBanner').className='result-banner';
  document.getElementById('nextBtn').style.display='none';document.getElementById('restartBtn').style.display='none';
}

function renderPool(ord){
  const pool=document.getElementById('cardPool');pool.innerHTML='';
  const inSlot=slotContents.filter(Boolean).map(i=>i.name);
  (ord||rounds[currentRound].items).forEach(item=>{if(!inSlot.includes(item.name))pool.appendChild(makeCard(item,'pool'));});
  if(selectedCard)pool.querySelectorAll('.hcard').forEach(c=>{if(c.dataset.name===selectedCard.name)c.classList.add('selected');});
}

function renderSlots(){
  const panel=document.getElementById('slotsPanel');panel.innerHTML='';
  for(let i=0;i<4;i++){
    const slot=document.createElement('div');
    slot.className='slot'+(slotContents[i]?' slot-ready':'')+(answered?' locked':'');
    if(!slotContents[i]&&selectedCard&&!answered)slot.classList.add('slot-target');
    const num=document.createElement('span');num.className='slot-num';num.textContent=i+1;slot.appendChild(num);
    if(slotContents[i]){slot.appendChild(makeCard(slotContents[i],'slot-'+i));}
    else{const h=document.createElement('span');h.className='slot-empty-hint';h.textContent=i===0?'earliest…':i===3?'latest…':'…';slot.appendChild(h);}
    slot.addEventListener('click',()=>onSlotClick(i));panel.appendChild(slot);
  }
}

function makeCard(item,loc){
  const card=document.createElement('div');card.className='hcard';card.dataset.name=item.name;card.dataset.year=item.year;
  const wikiHTML=item.wiki?`<a class="card-wiki" href="${item.wiki}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ read more</a>`:'';
  card.innerHTML=`<span class="card-emoji">${item.emoji}</span><span class="card-text"><span class="card-name">${item.name}</span><span class="card-era">${item.era}</span>${wikiHTML}</span>`;
  card.addEventListener('click',()=>onCardClick(item,loc));return card;
}

function onCardClick(item,loc){
  if(answered)return;
  if(loc.startsWith('slot-')){const idx=parseInt(loc.split('-')[1]);slotContents[idx]=null;selectedCard=item;rebuildView();return;}
  if(selectedCard&&selectedCard.name===item.name){selectedCard=null;rebuildView();return;}
  selectedCard=item;rebuildView();
}
function onSlotClick(idx){
  if(answered)return;
  if(!selectedCard){if(slotContents[idx]){selectedCard=slotContents[idx];slotContents[idx]=null;rebuildView();}return;}
  const prev=slotContents[idx];slotContents[idx]=selectedCard;selectedCard=prev||null;rebuildView();
}
function rebuildView(){renderPool();renderSlots();}

function checkAnswer(){
  if(answered)return;
  if(slotContents.some(s=>!s)){showBanner(false,'📜 Not yet!','Place all four cards first.');return;}
  const sorted=[...rounds[currentRound].items].sort((a,b)=>a.year-b.year);
  let ok=true; answered=true;
  const slotEls=document.getElementById('slotsPanel').querySelectorAll('.slot');
  slotContents.forEach((item,i)=>{
    const correct=item.year===sorted[i].year;if(!correct)ok=false;
    const el=slotEls[i].querySelector('.hcard');
    if(el){el.classList.add(correct?'correct':'wrong','locked');const e=el.querySelector('.card-era');if(e)e.style.visibility='visible';}
    slotEls[i].classList.add('locked');
  });
  document.querySelectorAll('.card-wiki').forEach(a=>a.classList.add('revealed'));
  if(ok){score+=hintUsed?5:10;roundResults.push(true);showBanner(true,'🏆 Brilliant!',hintUsed?'+5 points (hint used)':'+10 points! Perfect order!');}
  else{score+=2;roundResults.push(false);showBanner(false,'⚔️ Not quite!','+2 points for trying. Correct order below.');showCorrectOrder(sorted);}
  updateHUD();buildProgressTrack();
  document.getElementById('nextBtn').style.display=currentRound<rounds.length-1?'inline-block':'none';
  document.getElementById('restartBtn').style.display=currentRound>=rounds.length-1?'inline-block':'none';
}

function showCorrectOrder(sorted){
  const ar=document.getElementById('answerReveal');ar.innerHTML='<div class="answer-reveal-title">Correct order:</div>';
  sorted.forEach((item,i)=>{const c=document.createElement('div');c.className='answer-chip';c.innerHTML=`<span class="chip-num">${i+1}.</span>${item.emoji} ${item.name} <span style="opacity:.5">(${item.era})</span>`;ar.appendChild(c);});
  ar.className='answer-reveal show';
}

function nextRound(){if(currentRound<rounds.length-1){currentRound++;loadRound();}}

function showHint(){
  if(answered)return;hintUsed=true;
  const hints={world:'💡 Think: ancient civilisations → classical empires → medieval → early modern → 20th century.',britain:'💡 Think: ancient & Roman → Viking/Norman → medieval → Tudor/Stuart → Victorian → modern.',poland:'💡 Think: Piast dynasty (966–1370) → Jagiellonian → Commonwealth → Partitions (1795–1918) → modern Poland.',mixed:'💡 Think broadly: ancient world → medieval → early modern → 20th century.'};
  document.getElementById('hintBox').textContent=hints[mode]||hints.world;document.getElementById('hintBox').className='hint-box show';
}

function clearSlots(){if(answered)return;slotContents=[null,null,null,null];selectedCard=null;rebuildView();}

function showBanner(s,t,m){const b=document.getElementById('resultBanner');b.className='result-banner show '+(s?'success':'fail');document.getElementById('resultTitle').textContent=t;document.getElementById('resultMsg').textContent=m;}

function buildProgressTrack(){
  const pt=document.getElementById('progressTrack');pt.innerHTML='';
  for(let i=0;i<rounds.length;i++){const d=document.createElement('div');d.className='prog-dot'+(i<roundResults.length?(roundResults[i]?' correct-dot':' wrong-dot'):i===currentRound?' current':'');pt.appendChild(d);}
}

function updateHUD(){
  document.getElementById('scoreDisplay').textContent=score;document.getElementById('roundDisplay').textContent=currentRound+1;
  const p=score/(rounds.length*10);document.getElementById('starsDisplay').textContent=p>=.9?'⭐⭐⭐':p>=.6?'⭐⭐☆':p>=.3?'⭐☆☆':'☆☆☆';
}

buildStars();restart();
</script>
